################################################################################
# Tinder MCP — Dashboard Lovelace
# 4 onglets : Live | Actions | Stats | Configuration
#
# Prérequis HACS (frontend) :
#   - lovelace-mushroom (piitaya)       → cartes mushroom-*
#   - button-card (custom-cards)        → custom:button-card
#   - mini-graph-card (kalkih)          → custom:mini-graph-card
#
# Installation rapide via HACS :
#   HACS > Frontend > Search > Mushroom / Button Card / Mini Graph Card
################################################################################

title: Tinder MCP
views:

  # ============================================================
  # ONGLET 1 : LIVE — profil courant en temps réel
  # ============================================================
  - title: Live
    path: live
    icon: mdi:fire
    badges: []
    cards:

      # Photo du profil — plein format
      - type: picture-entity
        entity: camera.tinder_profile_photo
        name: false
        show_state: false
        style: |
          ha-card {
            border-radius: 16px;
            overflow: hidden;
            max-height: 380px;
          }

      # Nom + Age sur une ligne
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.tinder_profile_name
            name: Prénom
            icon: mdi:account
            fill_container: true
            primary_info: state
            secondary_info: name
            icon_color: pink

          - type: custom:mushroom-entity-card
            entity: sensor.tinder_profile_age
            name: Âge
            icon: mdi:cake-variant
            fill_container: true
            primary_info: state
            secondary_info: name
            icon_color: orange

      # Bio complète
      - type: custom:mushroom-template-card
        primary: "{{ states('sensor.tinder_profile_bio') }}"
        secondary: Bio
        icon: mdi:text-long
        icon_color: blue
        multiline_secondary: true

      # Compteur de matchs
      - type: custom:mushroom-entity-card
        entity: sensor.tinder_match_count
        name: Matchs totaux
        icon: mdi:heart-multiple
        icon_color: red
        primary_info: state
        secondary_info: name
        badge_icon: mdi:check-circle
        badge_color: green

  # ============================================================
  # ONGLET 2 : ACTIONS — boutons interactifs
  # ============================================================
  - title: Actions
    path: actions
    icon: mdi:gesture-tap
    badges: []
    cards:

      # En-tête avec la photo miniature + nom
      - type: horizontal-stack
        cards:
          - type: picture-entity
            entity: camera.tinder_profile_photo
            show_name: false
            show_state: false
            style: |
              ha-card { border-radius: 12px; max-height: 120px; }

          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.tinder_profile_name') }}"
            secondary: "{{ states('sensor.tinder_profile_age') }} ans"
            icon: mdi:account-circle
            icon_color: pink
            fill_container: true

      # Boutons principaux : Like et Pass côte à côte
      - type: horizontal-stack
        cards:

          # PASS — croix rouge
          - type: custom:button-card
            entity: button.tinder_pass
            name: PASS
            icon: mdi:close-circle-outline
            tap_action:
              action: call-service
              service: button.press
              service_data:
                entity_id: button.tinder_pass
            styles:
              card:
                - background-color: "#ff4444"
                - border-radius: "50%"
                - width: "120px"
                - height: "120px"
                - margin: "0 auto"
              name:
                - color: white
                - font-weight: bold
                - font-size: 14px
              icon:
                - color: white
                - width: 48px

          # SUPER LIKE — étoile bleue (centre)
          - type: custom:button-card
            entity: button.tinder_super_like
            name: SUPER
            icon: mdi:star
            tap_action:
              action: call-service
              service: button.press
              service_data:
                entity_id: button.tinder_super_like
            styles:
              card:
                - background-color: "#00aaff"
                - border-radius: "50%"
                - width: "80px"
                - height: "80px"
                - margin: "20px auto"
              name:
                - color: white
                - font-weight: bold
                - font-size: 11px
              icon:
                - color: white
                - width: 32px

          # LIKE — cœur vert
          - type: custom:button-card
            entity: button.tinder_like
            name: LIKE
            icon: mdi:heart
            tap_action:
              action: call-service
              service: button.press
              service_data:
                entity_id: button.tinder_like
            styles:
              card:
                - background-color: "#44cc44"
                - border-radius: "50%"
                - width: "120px"
                - height: "120px"
                - margin: "0 auto"
              name:
                - color: white
                - font-weight: bold
                - font-size: 14px
              icon:
                - color: white
                - width: 48px

      # Bouton Refresh — pleine largeur
      - type: custom:button-card
        entity: button.tinder_refresh
        name: Charger un nouveau profil
        icon: mdi:refresh-circle
        tap_action:
          action: call-service
          service: button.press
          service_data:
            entity_id: button.tinder_refresh
        styles:
          card:
            - background-color: "#555555"
            - border-radius: "12px"
            - height: "56px"
          name:
            - color: white
            - font-size: 15px
          icon:
            - color: "#aaaaaa"

  # ============================================================
  # ONGLET 3 : STATS
  # ============================================================
  - title: Stats
    path: stats
    icon: mdi:chart-line
    badges: []
    cards:

      # Graphique matchs sur 24h
      - type: custom:mini-graph-card
        entities:
          - entity: sensor.tinder_match_count
            name: Matchs
            color: "#e91e8c"
        name: Évolution des matchs (24h)
        hours_to_show: 24
        points_per_hour: 4
        line_width: 3
        show:
          icon: true
          state: true
          legend: false
          fill: true

      # Résumé statistiques
      - type: custom:mushroom-template-card
        primary: "{{ states('sensor.tinder_match_count') }} matchs au total"
        secondary: "Dernier profil : {{ states('sensor.tinder_profile_name') }}, {{ states('sensor.tinder_profile_age') }} ans"
        icon: mdi:heart-multiple
        icon_color: red

      # Historique des entités sous forme de tableau
      - type: history-graph
        entities:
          - entity: sensor.tinder_match_count
            name: Matchs
        hours_to_show: 24
        refresh_interval: 60

  # ============================================================
  # ONGLET 4 : CONFIGURATION
  # ============================================================
  - title: Config
    path: config
    icon: mdi:cog
    badges: []
    cards:

      # Statut global de l'intégration
      - type: custom:mushroom-template-card
        primary: >
          {% if is_state('sensor.tinder_profile_name', 'unavailable') %}
            Intégration hors ligne
          {% else %}
            Intégration active
          {% endif %}
        secondary: >
          {% if is_state('sensor.tinder_profile_name', 'unavailable') %}
            Vérifiez l'add-on Tinder MCP Server
          {% else %}
            Connecté — rafraîchissement toutes les 30s
          {% endif %}
        icon: >
          {% if is_state('sensor.tinder_profile_name', 'unavailable') %}
            mdi:alert-circle
          {% else %}
            mdi:check-circle
          {% endif %}
        icon_color: >
          {% if is_state('sensor.tinder_profile_name', 'unavailable') %}
            red
          {% else %}
            green
          {% endif %}

      # Entités de l'intégration
      - type: entities
        title: Entités Tinder MCP
        entities:
          - entity: sensor.tinder_profile_name
            name: Prénom (profil courant)
          - entity: sensor.tinder_profile_age
            name: Âge
          - entity: sensor.tinder_profile_bio
            name: Bio
          - entity: sensor.tinder_match_count
            name: Nombre de matchs
          - entity: camera.tinder_profile_photo
            name: Photo
          - entity: button.tinder_like
            name: Bouton Like
          - entity: button.tinder_pass
            name: Bouton Pass
          - entity: button.tinder_super_like
            name: Bouton Super Like
          - entity: button.tinder_refresh
            name: Bouton Refresh

      # Accès rapide aux outils développeur
      - type: custom:mushroom-template-card
        primary: "Tester tinder_mcp.swipe"
        secondary: "Outils Développeur > Services > tinder_mcp.swipe"
        icon: mdi:code-braces
        icon_color: purple
        tap_action:
          action: navigate
          navigation_path: /developer-tools/service
